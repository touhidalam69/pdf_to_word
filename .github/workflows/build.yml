name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore PdfToWordOcr.slnx

      - name: Build (warnings as errors)
        run: dotnet build PdfToWordOcr.slnx --configuration Release --no-restore -warnaserror

      - name: Test
        run: dotnet test PdfToWordOcr.slnx --configuration Release --no-build --verbosity normal
